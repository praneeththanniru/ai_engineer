<!doctype html>
<html>
<head>
  <title>Calculator App</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    h1 { color: #333; }
    .calculator { display: inline-block; margin-top: 30px; }
    .display { width: 210px; height: 40px; margin-bottom: 10px; font-size: 20px; text-align: right; padding: 5px; }
    button { width: 50px; height: 50px; font-size: 18px; margin: 2px; cursor: pointer; }
    .result { margin-top: 20px; font-size: 20px; color: green; }
  </style>
</head>
<body>
  <h1>Calculator</h1>
  <div class="calculator">
    <input type="text" id="display" class="display" readonly>
    <br>
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">/</button>
    <br>
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">*</button>
    <br>
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">-</button>
    <br>
    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="press('+')">+</button>
    <br>
    <button onclick="clearDisplay()">C</button>
  </div>

  <div class="result" id="result"></div>

  <script>
    let display = document.getElementById('display');
    let resultDiv = document.getElementById('result');

    function press(val) {
      display.value += val;
    }

    function clearDisplay() {
      display.value = '';
      resultDiv.innerText = '';
    }

    function calculate() {
      try {
        let expression = display.value;
        // Use fetch to call the Flask API
        fetch('/eval_calc?expr=' + encodeURIComponent(expression))
          .then(response => response.json())
          .then(data => {
            resultDiv.innerText = "Result: " + data.result;
          });
      } catch (err) {
        resultDiv.innerText = 'Error';
      }
    }
  </script>
</body>
</html>
