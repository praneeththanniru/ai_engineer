<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>
    {% if current_user.is_authenticated %}
        <p>Welcome, {{ current_user.id }}!</p>
        <a href="/logout">Log out</a>
    {% else %}
        <p>Please log in to continue.</p>
        <a href="/login">Log in</a>
    {% endif %}
</body>
</html>
